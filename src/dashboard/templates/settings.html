{% extends "base.html" %}

{% block title %}Settings{% endblock %}

{% block content %}
<h1 style="font-size: 2rem; font-weight: 700; margin-bottom: 30px;">
    <i class="fas fa-cog" style="color: var(--primary-color);"></i> Settings
</h1>

<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
    <div style="background: var(--card-bg); border-radius: 12px; padding: 20px; border: 1px solid var(--border-color);">
        <h3 style="margin-bottom: 15px;"><i class="fas fa-sync-alt"></i> Auto-Refresh</h3>
        <div style="padding: 10px 0; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 15px; flex-wrap: wrap;">
            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                <input type="checkbox" checked> Enable Auto-Refresh
            </label>
            <span style="font-size: 0.85rem; color: var(--text-muted);">Refresh every 5 seconds</span>
        </div>
    </div>
    
    <div style="background: var(--card-bg); border-radius: 12px; padding: 20px; border: 1px solid var(--border-color);">
        <h3 style="margin-bottom: 15px;"><i class="fas fa-palette"></i> Theme</h3>
        <div style="padding: 10px 0; display: flex; align-items: center; gap: 15px; flex-wrap: wrap;">
            <select style="padding: 8px 12px; background: var(--background-secondary); border: 1px solid var(--border-color); border-radius: 6px; color: var(--text-color);">
                <option value="dark"> Dark</option>
                <option value="light"> Light</option>
                <option value="system"> System Default</option>
            </select>
            <span style="font-size: 0.85rem; color: var(--text-muted);">Select your preferred theme</span>
        </div>
    </div>
    
    <div style="background: var(--card-bg); border-radius: 12px; padding: 20px; border: 1px solid var(--border-color);">
        <h3 style="margin-bottom: 15px;"><i class="fas fa-shield-alt"></i> Detection</h3>
        <div style="padding: 10px 0; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 15px; flex-wrap: wrap;">
            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                <input type="checkbox" checked> Auto-Scan
            </label>
            <span style="font-size: 0.85rem; color: var(--text-muted);">Scan every 30 seconds</span>
        </div>
        <div style="padding: 10px 0; display: flex; align-items: center; gap: 15px; flex-wrap: wrap;">
            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                <input type="checkbox"> Auto-Mitigate
            </label>
            <span style="font-size: 0.85rem; color: var(--text-muted);">Automatically terminate threats</span>
        </div>
    </div>
    
    <div style="background: var(--card-bg); border-radius: 12px; padding: 20px; border: 1px solid var(--border-color);">
        <h3 style="margin-bottom: 15px;"><i class="fas fa-clipboard-list"></i> Logging</h3>
        <div style="padding: 10px 0; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 15px; flex-wrap: wrap;">
            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                <input type="checkbox" checked> Encrypt Logs
            </label>
        </div>
        <div style="padding: 10px 0; display: flex; align-items: center; gap: 15px; flex-wrap: wrap;">
            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                <input type="checkbox" checked> Include Timestamps
            </label>
        </div>
    </div>
</div>

<div style="margin-top: 30px; padding: 20px; background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border-color);">
    <div style="display: flex; gap: 10px; flex-wrap: wrap;">
        <button onclick="alert(' Settings saved!')" style="padding: 10px 20px; border: none; border-radius: 8px; background: var(--success-color); color: white; cursor: pointer; font-weight: 600;">
            <i class="fas fa-save"></i> Save Settings
        </button>
        <button onclick="alert(' Settings reset!')" style="padding: 10px 20px; border: none; border-radius: 8px; background: var(--secondary-color); color: white; cursor: pointer; font-weight: 600;">
            <i class="fas fa-undo"></i> Reset to Defaults
        </button>
    </div>
</div>
{% endblock %}
