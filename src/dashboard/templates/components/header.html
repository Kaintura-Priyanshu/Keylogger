<nav style="background: var(--card-bg); border-bottom: 1px solid var(--border-color); padding: 0 2rem; position: sticky; top: 0; z-index: 1000;">
    <div style="max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; height: 70px;">
        <a href="{{ url_for('index') }}" style="display: flex; align-items: center; gap: 10px; text-decoration: none; font-size: 1.5rem; font-weight: 800; color: var(--text-color);">
            <i class="fas fa-shield-virus" style="color: var(--danger-color); font-size: 1.8rem;"></i>
            <span>Keylogger<span style="color: var(--primary-color);">Lab</span></span>
        </a>
        
        <button onclick="document.getElementById('navMenu').classList.toggle('active')" style="display: none; background: none; border: none; color: var(--text-color); font-size: 1.5rem; cursor: pointer;">
            <i class="fas fa-bars"></i>
        </button>
        
        <ul id="navMenu" style="display: flex; list-style: none; gap: 5px; margin: 0; padding: 0; align-items: center;">
            <li><a href="{{ url_for('dashboard') }}" style="display: flex; align-items: center; gap: 8px; padding: 8px 16px; border-radius: 8px; text-decoration: none; color: var(--text-muted); font-weight: 500;"><i class="fas fa-keyboard"></i> Dashboard</a></li>
            <li><a href="{{ url_for('detection') }}" style="display: flex; align-items: center; gap: 8px; padding: 8px 16px; border-radius: 8px; text-decoration: none; color: var(--text-muted); font-weight: 500;"><i class="fas fa-shield-alt"></i> Detection</a></li>
            <li><a href="{{ url_for('analytics') }}" style="display: flex; align-items: center; gap: 8px; padding: 8px 16px; border-radius: 8px; text-decoration: none; color: var(--text-muted); font-weight: 500;"><i class="fas fa-chart-pie"></i> Analytics</a></li>
            <li><a href="{{ url_for('settings') }}" style="display: flex; align-items: center; gap: 8px; padding: 8px 16px; border-radius: 8px; text-decoration: none; color: var(--text-muted); font-weight: 500;"><i class="fas fa-cog"></i> Settings</a></li>
            <li>
                <span style="display: flex; align-items: center; gap: 8px; padding: 6px 14px; background: var(--background-secondary); border-radius: 20px; font-size: 0.85rem; color: var(--text-muted); margin-left: 10px;">
                    <span style="display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--success-color); animation: pulse 2s infinite;"></span>
                    Online
                </span>
            </li>
        </ul>
    </div>
</nav>

<style>
@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
}

@media (max-width: 768px) {
    nav > div > button { display: block !important; }
    #navMenu {
        display: none !important;
        flex-direction: column !important;
        width: 100% !important;
        position: absolute !important;
        top: 70px !important;
        left: 0 !important;
        background: var(--card-bg) !important;
        padding: 20px !important;
        border-bottom: 1px solid var(--border-color) !important;
    }
    #navMenu.active { display: flex !important; }
    #navMenu li { width: 100%; }
    #navMenu li a { padding: 12px 16px !important; }
}
</style>

<script>
document.querySelectorAll('#navMenu a').forEach(link => {
    link.addEventListener('click', () => {
        document.getElementById('navMenu').classList.remove('active');
    });
});
</script>
